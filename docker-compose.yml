services:
  drupal:
    image: drupal:10-apache
    ports:
      - "8080:80"
    volumes:
      - drupal_modules:/opt/drupal/web/modules
      - drupal_profiles:/opt/drupal/web/profiles
      - drupal_themes:/opt/drupal/web/themes
      - drupal_sites:/opt/drupal/web/sites
      - ./behat.yml:/opt/drupal/behat.yml
      - ./features:/opt/drupal/features
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=drupal
      - POSTGRES_USER=drupal
      - POSTGRES_PASSWORD=drupal
    volumes:
      - db_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  drupal_modules:
  drupal_profiles:
  drupal_themes:
  drupal_sites:
  db_data: