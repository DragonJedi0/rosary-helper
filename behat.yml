default:
  suites:
    default:
      paths:
        - /opt/drupal/features
      contexts:
        - FeatureContext
        - Drupal\DrupalExtension\Context\DrupalContext
        - Drupal\DrupalExtension\Context\MinkContext
  extensions:
    Behat\MinkExtension:
      base_url: http://drupal
      sessions:
        default:
          browserkit_http: ~
    Drupal\DrupalExtension:
      blackbox: ~
      api_driver: blackbox