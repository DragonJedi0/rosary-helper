name: Drupal CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: drupal
          POSTGRES_USER: drupal
          POSTGRES_PASSWORD: drupal
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      drupal:
        image: drupal:10-apache
        ports:
          - 8080:80

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Behat
        run: |
          docker exec ${{ job.services.drupal.id }} bash -c "cd /var/www/html && composer require --dev behat/behat drupal/drupal-extension"
      
      - name: Copy Behat config and features
        run: |
          docker cp behat.yml ${{ job.services.drupal.id }}:/var/www/html/behat.yml
          docker cp features ${{ job.services.drupal.id }}:/var/www/html/features

      - name: Run Behat tests
        run: |
          docker exec ${{ job.services.drupal.id }} bash -c "cd /var/www/html && vendor/bin/behat"
