name: Drupal CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: drupal
          POSTGRES_USER: drupal
          POSTGRES_PASSWORD: drupal
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      drupal:
        image: drupal:10-apache
        ports:
          - 8080:80

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Drupal
        run: sleep 10

      - name: Install Composer dependencies
        run: |
          docker exec ${{ job.services.drupal.id }} bash -c "cd /opt/drupal && composer require --dev behat/behat drupal/drupal-extension && composer require drush/drush:^13 -W"

      - name: Copy Behat config and features
        run: |
          docker cp behat.yml ${{ job.services.drupal.id }}:/opt/drupal/behat.yml
          docker cp features ${{ job.services.drupal.id }}:/opt/drupal/features

      - name: Install Drupal
        run: |
          docker exec ${{ job.services.drupal.id }} bash -c "cd /opt/drupal && vendor/bin/drush site:install standard --db-url=pgsql://drupal:drupal@db/drupal --account-pass=admin -y"

      - name: Seed test content
        run: |
          docker cp scripts/create-test-content.php ${{ job.services.drupal.id }}:/opt/drupal/create-test-content.php
          docker exec ${{ job.services.drupal.id }} bash -c "cd /opt/drupal && vendor/bin/drush php:script create-test-content.php"

      - name: Run Behat tests
        run: |
          docker exec ${{ job.services.drupal.id }} bash -c "cd /opt/drupal && vendor/bin/behat"